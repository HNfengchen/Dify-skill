identity:
  name: sql-query
  author: qjzt_cn
  label:
    en_US: SQL Database Query
    zh_Hans: SQL数据库查询
    pt_BR: Consulta de Banco de Dados SQL
description:
  human:
    en_US: A tool for executing SQL queries on multiple database types including PostgreSQL, MySQL, Oracle, and SQLite.
    zh_Hans: 用于执行SQL数据库查询的工具，支持PostgreSQL、MySQL、Oracle和SQLite等多种数据库。
    pt_BR: Uma ferramenta para executar consultas SQL em vários tipos de banco de dados.
  llm: A tool for executing SQL queries on databases. Supports PostgreSQL, MySQL, Oracle, and SQLite. You can use this tool to perform database operations including SELECT statements.
parameters:
  - name: db_type
    type: select
    required: true
    label:
      en_US: Database Type
      zh_Hans: 数据库类型
      pt_BR: Tipo de Banco de Dados
    human_description:
      en_US: Select the database type you want to connect to.
      zh_Hans: 选择要连接的数据库类型。
      pt_BR: Selecione o tipo de banco de dados.
    llm_description: The type of database to connect to. Supported types are PostgreSQL, MySQL, Oracle, and SQLite.
    form: form
    default: postgresql
    options:
      - value: postgresql
        label:
          en_US: PostgreSQL
          zh_Hans: PostgreSQL
      - value: mysql
        label:
          en_US: MySQL
          zh_Hans: MySQL
      - value: oracle
        label:
          en_US: Oracle
          zh_Hans: Oracle
      - value: sqlite
        label:
          en_US: SQLite
          zh_Hans: SQLite
  - name: host
    type: string
    required: false
    label:
      en_US: Host
      zh_Hans: 主机地址
    human_description:
      en_US: Database server host address (e.g., localhost, 192.168.1.100)
      zh_Hans: 数据库服务器主机地址（例如：localhost, 192.168.1.100）
    llm_description: The database server host address.
    form: llm
  - name: port
    type: number
    required: false
    label:
      en_US: Port
      zh_Hans: 端口
    human_description:
      en_US: Database server port (e.g., 5432 for PostgreSQL, 3306 for MySQL)
      zh_Hans: 数据库服务器端口（例如：PostgreSQL为5432，MySQL为3306）
    llm_description: The database server port number.
    form: llm
  - name: username
    type: string
    required: false
    label:
      en_US: Username
      zh_Hans: 用户名
    human_description:
      en_US: Database username for authentication
      zh_Hans: 数据库认证用户名
    llm_description: The database username for authentication.
    form: llm
  - name: password
    type: string
    required: false
    label:
      en_US: Password
      zh_Hans: 密码
    human_description:
      en_US: Database password for authentication
      zh_Hans: 数据库认证密码
    llm_description: The database password for authentication.
    form: llm
  - name: database
    type: string
    required: false
    label:
      en_US: Database Name
      zh_Hans: 数据库名称
    human_description:
      en_US: The name of the database to connect to
      zh_Hans: 要连接的数据库名称
    llm_description: The name of the database to connect to.
    form: llm
  - name: db_uri
    type: string
    required: false
    label:
      en_US: Database Connection URI (Advanced)
      zh_Hans: 数据库连接URI（高级）
      pt_BR: URI de Conexão do Banco de Dados
    human_description:
      en_US: "Full database connection URI. If provided, other connection parameters will be ignored. Format: dialect+driver://username:password@host:port/database"
      zh_Hans: "完整的数据库连接URI。如果提供此参数，其他连接参数将被忽略。格式：dialect+driver://username:password@host:port/database"
      pt_BR: "URI de conexão completa do banco de dados."
    llm_description: "Full database connection URI in the format of dialect+driver://username:password@host:port/database. If provided, individual connection parameters will be ignored."
    form: llm
  - name: sql_query
    type: string
    required: true
    label:
      en_US: SQL Query
      zh_Hans: SQL语句
      pt_BR: SQL string
    human_description:
      en_US: Enter your SQL query statement (e.g., SELECT * FROM table_name)
      zh_Hans: 输入要执行的SQL查询语句（例如：SELECT * FROM table_name）
      pt_BR: Enter your SQL query statement
    llm_description: The SQL query to execute. Support standard SQL syntax including SELECT statements.
    form: llm
  - name: format
    type: select
    required: false
    label:
      en_US: Output format
      zh_Hans: 输出格式
    human_description:
      en_US: Choose the output format for query results.
      zh_Hans: 选择查询结果的输出格式。
    form: form
    default: json
    options:
      - value: json
        label:
          en_US: JSON
          zh_Hans: JSON
      - value: json rows arr
        label:
          en_US: JSON rows array
          zh_Hans: JSON行数组
      - value: csv
        label:
          en_US: CSV file
          zh_Hans: CSV文件
      - value: yaml to file
        label:
          en_US: YAML file
          zh_Hans: YAML文件
      - value: yaml to string
        label:
          en_US: YAML string
          zh_Hans: YAML字符串
      - value: Markdown to file
        label:
          en_US: Markdown file
          zh_Hans: Markdown文件
      - value: Markdown to string
        label:
          en_US: Markdown string
          zh_Hans: Markdown字符串
      - value: html to file
        label:
          en_US: HTML file
          zh_Hans: HTML文件
      - value: html to string
        label:
          en_US: HTML string
          zh_Hans: HTML字符串
extra:
  python:
    source: tools/sql-db.py
